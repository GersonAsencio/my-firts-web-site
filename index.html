<!DOCTYPE html> <!-- Indica que tipo de documento estamos usando-->
<html lang="en"> <!--Contenedor de toda la página | lang = lenguaje de la página-->
<head> <!--Información interna de tu web-->
    <meta charset="UTF-8"> <!-- meta = metadato | charset puedes escoger el tipo de escritura (UTF-8 muestra la ñ y simbolos)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adapta tu web a celulares (responsive)-->
    <meta name="description" content="Los mejores especialistas a tu alcance,  agenta tu cita presencial o virtual">
    <meta rel="stylesheet" href="estilos.css"> <!--Conectar el HTML con el contenido | rel = relation | href = la ruta donde está el archivo-->
    <title>CLinica Iberoamericana | Atención profesional</title> <!-- Permite agregar un titulo que aparece en la pestaña del navegador-->
</head>
<body>
    <!-- Etiquetas semánticas-->
    <header></header> <!-- Ubicar el encabezado a tu web | logos - menús - navbar-->
    <nav></nav> <!-- Menú de navegación -->
    <main></main> <!-- Almacena el contenido principal de la pagina -->
    <section></section> <!-- Divide el contenido en bloques -->
    <div></div> <!--contenedor versatil dependiendo de los estilos configurados -->
    <footer></footer> <!-- Parte  final de la pagina-->

    <!-- Etiquetas para texto y contenido -->
     <h1></h1> <!-- Titulos -->
     <p></p> <!-- Parrafos -->
     <strong></strong> <!-- Tecto en negritas -->
     <em></em> <!-- Texto con énfasis -->

     <!-- Orden y listas-->
    <ul> <!-- Lista sin orden -->
        <li>Pera</li> <!-- Elemento de la lista -->
        <li> Manzana</li> 
        <li> Platano</li>
    </ul>
    <ol> <!-- Lista ordenada-->   
        <li>Pera</li> 
        <li> Manzana</li> 
        <li> Platano</li>
    </ol>

    <!-- imagenes y enlaces -->
     <img> <!-- Importar imagenes -->
     <a></a> <!-- Crear enlaces-->

    <!-- Formularios-->
    <form> <!-- Agrupar campos de entrada -->
        <label></label> <!-- tecto de acompañamiento al input -->
        <input> <!-- campo donde el usuario ingresa datos -->
        <button></button> <!-- boton de acción -->
</body>
</html>
